<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>وظائف السعودية - منصة التوظيف الأولى</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background: #f0f4f8;
            color: #1a202c;
            padding: 20px;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }
        .header {
            background: linear-gradient(135deg, #0f2b4a, #1a4a7a);
            color: white;
            padding: 40px 30px;
            border-radius: 24px;
            margin-bottom: 40px;
            box-shadow: 0 12px 30px rgba(15, 43, 74, 0.4);
            position: relative;
            overflow: hidden;
        }
        .header::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -20%;
            width: 60%;
            height: 200%;
            background: rgba(255, 255, 255, 0.04);
            transform: rotate(15deg);
        }
        .header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            position: relative;
            z-index: 1;
        }
        .header h1 i {
            margin-left: 15px;
        }
        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-top: 8px;
            position: relative;
            z-index: 1;
        }
        .search-bar {
            background: white;
            padding: 15px 25px;
            border-radius: 60px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 25px;
            position: relative;
            z-index: 1;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        .search-bar input,
        .search-bar select {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 40px;
            background: #f0f4f8;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            min-width: 150px;
            outline: none;
        }
        .search-bar button {
            background: #e67e22;
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 40px;
            font-weight: 700;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
        }
        .search-bar button:hover {
            background: #d35400;
        }
        .jobs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 28px;
        }
        .job-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
            transition: 0.3s ease;
            border-right: 5px solid #1a4a7a;
            cursor: pointer;
        }
        .job-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 40px rgba(15, 43, 74, 0.15);
        }
        .job-card .badge {
            background: #e67e22;
            color: white;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 12px;
        }
        .job-card h3 {
            font-size: 1.4rem;
            font-weight: 800;
            color: #0f2b4a;
            margin-bottom: 4px;
        }
        .job-card .company {
            font-weight: 500;
            color: #2d3748;
            margin-bottom: 14px;
        }
        .job-card .company i {
            color: #1a4a7a;
            margin-left: 6px;
        }
        .job-card .brief {
            color: #4a5568;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 14px;
        }
        .job-card .meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 0.9rem;
            color: #2d3748;
        }
        .job-card .meta i {
            color: #1a4a7a;
            width: 20px;
        }
        /* صفحة التفاصيل */
        .detail-page {
            display: none;
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 800px;
            margin: 0 auto 40px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        .detail-page.active {
            display: block;
        }
        .detail-page .back-btn {
            background: none;
            border: none;
            color: #1a4a7a;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 25px;
            font-family: 'Tajawal', sans-serif;
        }
        .detail-page .back-btn i {
            margin-left: 10px;
        }
        .detail-page h2 {
            font-size: 2rem;
            color: #0f2b4a;
            margin-bottom: 8px;
        }
        .detail-page .company-detail {
            font-size: 1.2rem;
            color: #2d3748;
            margin-bottom: 20px;
        }
        .detail-page .full-description {
            line-height: 1.9;
            color: #2d3748;
            margin: 25px 0;
            font-size: 1.05rem;
        }
        .detail-page .contact-box {
            background: #f7fafc;
            padding: 25px;
            border-radius: 16px;
            margin-top: 25px;
            border-right: 4px solid #e67e22;
        }
        .detail-page .contact-box h4 {
            margin-bottom: 12px;
            color: #0f2b4a;
        }
        .detail-page .contact-box p {
            margin: 8px 0;
            font-size: 1.05rem;
        }
        .detail-page .contact-box i {
            width: 28px;
            color: #1a4a7a;
        }
        .detail-page .apply-btn {
            background: #e67e22;
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 40px;
            font-weight: 700;
            font-family: 'Tajawal', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
            width: 100%;
        }
        .detail-page .apply-btn:hover {
            background: #d35400;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            color: #4a5568;
            font-size: 0.9rem;
            border-top: 1px solid #e2e8f0;
            padding-top: 25px;
        }
        @media (max-width: 600px) {
            .header h1 {
                font-size: 2rem;
            }
            .search-bar {
                flex-direction: column;
            }
            .jobs-grid {
                grid-template-columns: 1fr;
            }
            .detail-page {
                padding: 25px;
            }
        }
    </style>
</head>
<body>

        <!-- صفحة التفاصيل (مخفية افتراضياً) -->

            <h2 id="detailTitle"></h2>

            <div class="full-description" id="detailDescription"></div>
            <div class="contact-box">

                <p><i class="fas fa-envelope"></i> <span id="detailEmail">falonri@mert.com</span></p>
                <p><i class="fas fa-map-marker-alt"></i> <span id="detailLocation"></span></p>
            </div>
            <button class="apply-btn" onclick="alert('تم إرسال طلبك بنجاح! سيتم التواصل معك خلال 24 ساعة.')">

        </div>

        // دالة لعرض البطاقات
        function renderJobs(filteredJobs) {
            const grid = document.getElementById('jobsGrid');
            grid.innerHTML = '';
            filteredJobs.forEach(job => {
                const card = document.createElement('div');
                card.className = 'job-card';
                card.setAttribute('data-id', job.id);
                card.innerHTML = `
                    <span class="badge">بدون مؤهل</span>
                    <h3>${job.title}</h3>
                    <div class="company"><i class="fas fa-building"></i> ${job.company}</div>
                    <div class="brief">${job.description.substring(0, 65)}...</div>
                    <div class="meta">
                        <span><i class="fas fa-map-marker-alt"></i> ${job.city}</span>
                        <span><i class="fas fa-phone-alt"></i> ${job.phone}</span>
                    </div>
                `;
                card.addEventListener('click', () => openDetail(job.id));
                grid.appendChild(card);
            });
        }

        // دالة لعرض صفحة التفاصيل
        function openDetail(id) {
            const job = jobs.find(j => j.id === id);
            if (!job) return;
            document.getElementById('detailTitle').textContent = job.title;
            document.getElementById('detailCompany').textContent = job.company;
            document.getElementById('detailDescription').textContent = job.description;
            document.getElementById('detailPhone').textContent = job.phone;
            document.getElementById('detailLocation').textContent = job.city;
            // إخفاء القائمة وإظهار التفاصيل
            document.getElementById('jobsGrid').style.display = 'none';
            document.querySelector('.header').style.display = 'none';
            document.querySelector('.footer').style.display = 'none';
            document.getElementById('detailPage').classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // دالة للعودة للقائمة
        function closeDetail() {
            document.getElementById('jobsGrid').style.display = 'grid';
            document.querySelector('.header').style.display = 'block';
            document.querySelector('.footer').style.display = 'block';
            document.getElementById('detailPage').classList.remove('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // فلترة الوظائف
        function filterJobs() {
            const searchVal = document.getElementById('searchInput').value.trim().toLowerCase();
            const cityVal = document.getElementById('cityFilter').value;
            let filtered = jobs.filter(job => {
                const matchCity = cityVal === 'all' || job.city === cityVal;
                const matchSearch = job.title.includes(searchVal) || job.company.includes(searchVal) || job.description
                    .includes(searchVal);
                return matchCity && matchSearch;
            });
            renderJobs(filtered);
        }

        // تحميل أولي
        renderJobs(jobs);

        // دعم البحث بالضغط على Enter
        document.getElementById('searchInput').addEventListener('keyup', function(e) {
            if (e.key === 'Enter') filterJobs();
        });
    </script>
</body>
